<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdis – RNV Dienstplan</title>
<style>
  :root {
    --blue: #00254C;
    --blue2: #003b78;
    --orange: #EE7202;
    --orange2: #ff8c1a;
    --white: #fff;
    --surface: #f2f5fa;
    --surface2: #e4eaf4;
    --text: #00254C;
    --text2: #3a5570;
    --muted: #7a95b0;
    --border: #cdd8e8;
    --success: #176b38;
    --danger: #b8291e;
    --r: 10px;
    --rl: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  /* ─── HEADER ─── */
  .topbar { background: var(--blue); height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 10px; position: sticky; top: 0; z-index: 50; }
  .topbar-mark { width: 30px; height: 30px; background: var(--orange); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .topbar-name { color: #fff; font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
  .topbar-user { color: rgba(255,255,255,.5); font-size: 12px; margin-left: auto; }
  .topbar-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 6px; padding: 4px 11px; font-size: 12px; cursor: pointer; }
  .topbar-btn:hover { background: rgba(255,255,255,.18); }

  /* ─── SCREENS ─── */
  .screen { display: none; }
  .screen.on { display: block; }

  /* ─── LOGIN ─── */
  #loginScreen.on { display: flex; min-height: 100vh; background: var(--blue); align-items: center; justify-content: center; padding: 20px; }
  .lcard { background: #fff; border-radius: var(--rl); padding: 32px 28px; width: 100%; max-width: 340px; }
  .llogo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .llogo-mark { width: 38px; height: 38px; background: var(--orange); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .llogo-title { font-size: 19px; font-weight: 700; color: var(--blue); }
  .llogo-sub { font-size: 11px; color: var(--muted); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .field input { width: 100%; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: 14px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; }
  .field input:focus { border-color: var(--orange); }
  .btn-login { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: var(--r); padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }
  .btn-login:hover { background: var(--blue2); }
  .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  .lerr { background: #fff0f0; border: 1px solid #ffcaca; color: var(--danger); border-radius: var(--r); padding: 9px 13px; font-size: 12px; margin-top: 12px; display: none; }
  .lerr.on { display: block; }
  .lnote { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.5; }

  /* ─── MAIN ─── */
  .wrap { max-width: 720px; margin: 0 auto; padding: 20px 14px 40px; }

  .monthnav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .month-title { font-size: 19px; font-weight: 700; color: var(--blue); letter-spacing: -.3px; flex: 1; text-align: center; }
  .mnbtn { background: #fff; border: 1.5px solid var(--border); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 15px; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: border-color .12s, color .12s; }
  .mnbtn:hover { border-color: var(--orange); color: var(--orange); }

  /* ─── STATS ─── */
  .stats { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: var(--r); padding: 10px 14px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--blue); line-height: 1; }
  .stat-val.o { color: var(--orange); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

  /* ─── CALENDAR ─── */
  .cal { background: #fff; border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; }
  .cal-head { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--blue); }
  .cal-wd { text-align: center; padding: 9px 2px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,.65); text-transform: uppercase; letter-spacing: .4px; }
  .cal-wd.we { color: rgba(238,114,2,.9); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day { min-height: 52px; padding: 5px; border-right: 1px solid #edf1f8; border-bottom: 1px solid #edf1f8; }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.empty { background: #f8fafd; }
  .cal-day.we { background: #fefbf5; }
  .cal-day.today { background: #eef4ff; }
  .cal-day.clickable { cursor: pointer; }
  .cal-day.clickable:hover { background: #fff5e8; }
  .dnum { font-size: 11px; font-weight: 500; color: var(--text2); line-height: 1; }
  .today .dnum { background: var(--blue); color: #fff; width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
  .chip { margin-top: 3px; background: var(--orange); color: #fff; border-radius: 4px; padding: 2px 4px; font-size: 9.5px; font-weight: 700; display: block; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-time { font-size: 8.5px; color: var(--muted); margin-top: 1px; }
  .chip-abs { background: var(--surface2); color: var(--muted); font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-top: 2px; display: block; }

  /* ─── SPINNER ─── */
  .spin-wrap { text-align: center; padding: 48px 16px; }
  .spin { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 12px; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .spin-txt { color: var(--text2); font-size: 13px; }
  .spin-sub { color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* ─── DETAIL ─── */
  .detail { background: #fff; border: 1px solid var(--border); border-radius: var(--rl); display: none; overflow: hidden; }
  .detail.on { display: block; }
  .dhead { background: var(--blue); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .dhead-ico { background: var(--orange); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .dhead-title { color: #fff; font-size: 15px; font-weight: 700; }
  .dhead-sub { color: rgba(255,255,255,.6); font-size: 11px; margin-top: 1px; }
  .dhead-close { margin-left: auto; background: rgba(255,255,255,.15); border: none; color: #fff; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .dbody { padding: 16px; }

  /* Umlauf-Karten */
  .ulist { display: flex; flex-direction: column; gap: 10px; }
  .ucard { border: 1.5px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .ucard-head { background: var(--surface); padding: 7px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .unr { font-size: 11px; font-weight: 700; color: var(--orange); }
  .ulinie { background: var(--blue); color: #fff; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
  .ubody { padding: 10px 12px; }
  .srow { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .srow + .srow { border-top: 1px dashed #e4eaf4; }
  .stime { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; color: var(--blue); min-width: 40px; }
  .srow.s .stime { color: var(--success); }
  .srow.e .stime { color: var(--orange); }
  .sarr { color: var(--muted); font-size: 11px; }
  .scode { font-family: monospace; font-size: 11px; font-weight: 700; background: var(--surface2); padding: 1px 6px; border-radius: 4px; letter-spacing: .8px; color: var(--text2); }
  .sname { font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pause-badge { text-align: center; padding: 5px; font-size: 10px; color: var(--muted); border-top: 1px dashed var(--border); margin-top: 2px; }

  .total { background: var(--blue); color: #fff; border-radius: var(--r); padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .total-lbl { font-size: 11px; color: rgba(255,255,255,.6); }
  .total-range { font-family: monospace; font-size: 12px; color: rgba(255,255,255,.85); margin-top: 2px; }
  .total-val { font-size: 15px; font-weight: 700; }

  .acts { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .abtn { flex: 1; min-width: 100px; padding: 9px 12px; border-radius: var(--r); font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .abtn.note { background: var(--orange); color: #fff; }
  .abtn.note:hover { background: var(--orange2); }
  .abtn.copy { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .abtn.copy:hover { background: var(--surface); }
  .abtn.ios { background: #1c1c1e; color: #fff; }

  .raw { font-family: 'SF Mono','Fira Code',monospace; font-size: 11.5px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; white-space: pre; overflow-x: auto; color: var(--text); line-height: 1.65; margin-top: 12px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px); background: var(--blue); color: #fff; padding: 8px 18px; border-radius: 18px; font-size: 12px; font-weight: 500; transition: transform .28s; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.on { transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 36px 16px; }
  .empty-ico { font-size: 36px; margin-bottom: 10px; }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text2); }
  .empty-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }

  @media (max-width: 480px) {
    .stats { gap: 6px; } .stat { padding: 8px 10px; } .stat-val { font-size: 17px; }
    .acts { flex-direction: column; }
    .chip { font-size: 8.5px; }
  }
</style>
</head>
<body>

<div id="loginScreen" class="screen on">
  <div class="lcard">
    <div class="llogo">
      <div class="llogo-mark">🚃</div>
      <div>
        <div class="llogo-title">Perdis</div>
        <div class="llogo-sub">RNV Dienstplan-Übersicht</div>
      </div>
    </div>
    <div class="field">
      <label>Benutzerkennung</label>
      <input type="text" id="inUser" placeholder="z. B. aslan" autocomplete="username" />
    </div>
    <div class="field">
      <label>Kennwort</label>
      <input type="password" id="inPass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Anmelden & Dienstplan laden</button>
    <div class="lerr" id="loginErr"></div>
    <p class="lnote">Login direkt bei fahrerauskunft.rnv-online.de<br>Achtung: CORS-Erweiterung wird benötigt!</p>
  </div>
</div>

<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-mark">🚃</div>
  <span class="topbar-name">Perdis</span>
  <span class="topbar-user" id="topUser"></span>
  <button class="topbar-btn" onclick="doLogout()">Abmelden</button>
</div>

<div id="mainScreen" class="screen">
  <div class="wrap">
    <div class="monthnav">
      <button class="mnbtn" onclick="changeMonth(-1)">◀</button>
      <div class="month-title" id="monthTitle">—</div>
      <button class="mnbtn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="stats" id="statsRow" style="display:none">
      <div class="stat"><div class="stat-val" id="stCount">0</div><div class="stat-lbl">Dienste</div></div>
      <div class="stat"><div class="stat-val o" id="stH">—</div><div class="stat-lbl">Planzeit</div></div>
      <div class="stat"><div class="stat-val" id="stNext">—</div><div class="stat-lbl">Nächster</div></div>
    </div>
    <div class="cal" id="calBox">
      <div class="spin-wrap"><div class="spin"></div><div class="spin-txt">Dienstplan wird geladen…</div><div class="spin-sub">Verbinde mit RNV WebComm</div></div>
    </div>
    <div class="detail" id="detailBox">
      <div class="dhead">
        <div class="dhead-ico">🚋</div>
        <div><div class="dhead-title" id="dTitle">Dienst</div><div class="dhead-sub" id="dSub">—</div></div>
        <button class="dhead-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dbody" id="dBody">
        <div class="spin-wrap"><div class="spin"></div><div class="spin-txt">Lade Details…</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── KONFIGURATION ───────────────────────────────────────────────────────────
const BASE  = "https://fahrerauskunft.rnv-online.de/WebComm";

const MONATE  = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const WKTAG   = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const WKLONG  = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

const STOPS = {
  "Bth. HD Bergheim":"BHBE","Bth HD Bergheim":"BHBE","Bth. HD Betriebshof":"BHBH",
  "Bth HD Betriebshof":"BHBH","Betriebshof":"BHBH","Bismarckplatz":"BHBP",
  "Kirchheim Friedhof":"KHFH","Heiligenbergschule":"HHHS","Hans-Thoma-Platz":"HHHT",
  "Rohrbach Süd":"RSRS","HD Hauptbahnhof":"BHHF","Campus Bergheim":"BHCA",
  "Bth. Wieblinger Weg":"BHWI","S-Bhf Weststadt/Südstadt":"WSBF",
  "Campus Im Neuenheimer Feld":"NFCN","Zoo":"NFZO","Schwimmbad":"NFSB",
  "Kopfklinik":"NFKO","Jugendherberge":"NFJH","S-Bhf Schlierbach/Ziegelhausen":"SBBF",
  "S-Bhf Orthopädie":"SBOK","S-Bhf Kirchheim/Rohrbach":"KHBF","Kirchheim Rathaus":"KHRH",
  "Kirchheimer Hof":"KHKH","Hagellachstraße":"KHHS","Kirchheimer Straße":"EHKS",
  "Heiligenberg":"HHBG","Heiligenbergstraße":"HHHB","Johann-Fischer-Str.":"HHJF",
  "Tiefburg":"HHTG","Turnerbrunnen":"HHTB","Mühltalstraße":"HHMS",
  "Rohrbach Markt":"RBMA","Rohrbach Kirche":"RBKI","Rohrbach Friedhof":"RBFR",
  "Rohrbach Rathaus":"RBRH","Rohrbach NVZ":"RBNV","Sickingenplatz":"RBSP",
  "Alte Brücke":"ASAB","Friedrich-Ebert-Platz":"ASEP","Peterskirche":"ASPK",
  "Rathaus/Bergbahn":"ASRB","Stadthalle":"ASSH","Universitätsplatz":"ASUP",
  "S-Bhf Altstadt":"ASBF","Bunsengymnasium":"NHBG","Theodor-Heuss-Brücke":"NHTH",
  "Technologiepark":"NHTP","Schriesheim Bahnhof":"SRBF","Eppelheimer Terrasse":"BSET",
  "Marlene-Dietrich-Platz":"SSMD","Mark-Twain-Center":"SSMT","HD Rheinstraße":"SSRS",
  "Leimen Friedhof":"LEFH","Leimen Georgi-Marktplatz":"LEGP","Leimen Kurpfalz-Centrum":"LEKC"
};

const ENDST = {
  "21": {wt:["HHHT","SRBF"], we:["HHHT","BHBP"]},
  "22": {wt:["BHBP","EHKS"], we:["BHBP","EHKS"]},
  "23": {wt:["BHBP","LEFH"], we:["BHBP","LEFH"]},
  "24": {wt:["RSRS","HHHS"], we:["RSRS","HHHS"]},
  "26": {wt:["KHFH","HHHS"], we:["KHFH","HHHS"]},
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {
  user:"", pass:"",
  month: new Date().getMonth(),
  year:  new Date().getFullYear(),
  services: [],
  rawText: "", rawTitle: ""
};

// ─── HILFSFUNKTIONEN ─────────────────────────────────────────────────────────
function ort2kuerzel(n) {
  n = (n||"").trim().replace(/\u00a0/g,"");
  if (!n) return "????";
  if (STOPS[n]) return STOPS[n];
  for (const [k,v] of Object.entries(STOPS))
    if (k.toLowerCase().includes(n.toLowerCase()) || n.toLowerCase().includes(k.toLowerCase())) return v;
  const L = n.toUpperCase().replace(/[^A-Z]/g,"");
  return L.slice(0,4).padEnd(4,"?") || "????";
}

function gegenEnd(linie, von, dow) {
  const i = ENDST[linie]; if (!i) return null;
  const [a,b] = dow>=5 ? i.we : i.wt;
  if (von===a) return b; if (von===b) return a; return null;
}

function min2str(m) {
  if (m<0) m+=1440; const h=Math.floor(m/60); return `${h}h${String(m%60).padStart(2,"0")}min`;
}
function zeit2min(t) {
  if (!t||t==="-") return 0; const [h,m]=t.split(":").map(Number); return h*60+m;
}
function pad2(n){ return String(n).padStart(2,"0"); }

// ─── DIREKTER FETCH (OHNE PROXY) ─────────────────────────────────────────────
async function pfetch(url, opts={}) {
  const r = await fetch(url, {
    method: opts.method || "GET",
    headers: {
      "Content-Type": opts.body ? "application/x-www-form-urlencoded" : undefined,
      ...(opts.headers||{})
    },
    body: opts.body || undefined,
    redirect: "follow",
    // WICHTIG: credentials: "include" überträgt die ASP.NET Session-Cookies
    credentials: "include"
  });
  
  if (!r.ok) {
    throw new Error(`Netzwerkfehler: ${r.status}`);
  }
  
  return r;
}

// ─── HTML PARSER ─────────────────────────────────────────────────────────────
function parseHTML(txt) {
  const dp = new DOMParser(); return dp.parseFromString(txt, "text/html");
}

function getHidden(doc) {
  const fields = {};
  doc.querySelectorAll("input[type=hidden]").forEach(i => {
    if (i.name) fields[i.name] = i.value||"";
  });
  return fields;
}

function buildForm(fields) {
  return Object.entries(fields).map(([k,v]) =>
    encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById("inUser").value.trim();
  const pass = document.getElementById("inPass").value;
  if (!user||!pass) { showErr("Bitte Benutzerkennung und Kennwort eingeben."); return; }
  S.user=user; S.pass=pass;

  const btn=document.getElementById("loginBtn");
  btn.disabled=true; btn.textContent="Verbinde…"; hideErr();

  try {
    // Schritt 1: Cookie-Test-URL abrufen (setzt Testing-Cookie)
    await pfetch(`${BASE}/default.aspx?TestingCookie=1`);

    // Schritt 2: Login-Seite abrufen → __VIEWSTATE etc. holen
    const r1 = await pfetch(`${BASE}/default.aspx`);
    const html1 = await r1.text();
    const doc1 = parseHTML(html1);
    const hf = getHidden(doc1);

    // Schritt 3: Login-POST - Hier ist die Änderung!
    // Wir senden den expliziten Button-Namen mit, wie ein echter Klick.
    const payload = buildForm({
      ...hf,
      "__EVENTTARGET": "",
      "__EVENTARGUMENT": "",
      "ctl00$cntMainBody$lgnView$lgnLogin$UserName": user,
      "ctl00$cntMainBody$lgnView$lgnLogin$Password": pass,
      "ctl00$cntMainBody$lgnView$lgnLogin$LoginButton": "Anmelden" // <-- WICHTIG!
    });

    const r2 = await pfetch(`${BASE}/default.aspx?TestingCookie=1`, {
      method: "POST", 
      body: payload
    });
    const html2 = await r2.text();

    // Login prüfen: Wenn das Login-Formular im HTML noch da ist, schlug es fehl.
    if (html2.includes("id=\"ctl00_cntMainBody_lgnView_lgnLogin_UserName\"") || html2.includes("Kennwort prüfen")) {
      showErr("Login abgelehnt. Stimmen die Daten? Falls ja, blockiert der Browser die Cookies (siehe Tipps).");
      btn.disabled=false; btn.textContent="Anmelden & Dienstplan laden";
      return;
    }

    // Erfolgreich
    document.getElementById("loginScreen").classList.remove("on");
    document.getElementById("topbar").style.display="flex";
    document.getElementById("topUser").textContent=user;
    document.getElementById("mainScreen").classList.add("on");
    btn.disabled=false; btn.textContent="Anmelden & Dienstplan laden";

    await loadDienstplan();

  } catch(e) {
    showErr("Verbindungsfehler: "+e.message);
    btn.disabled=false; btn.textContent="Anmelden & Dienstplan laden";
  }
}

// ─── DIENSTPLAN LADEN ─────────────────────────────────────────────────────────
async function loadDienstplan() {
  updateMonthTitle();
  document.getElementById("calBox").innerHTML = `<div class="spin-wrap"><div class="spin"></div><div class="spin-txt">Dienstplan wird geladen…</div><div class="spin-sub">${MONATE[S.month]} ${S.year}</div></div>`;
  document.getElementById("statsRow").style.display="none";
  closeDetail();

  try {
    // roster.aspx abrufen (aktueller Monat wird angezeigt)
    const dateStr = `${S.year}-${pad2(S.month+1)}-01`;

    let rosterHtml;
    // Erst roster.aspx laden um __VIEWSTATE zu bekommen
    const r0 = await pfetch(`${BASE}/roster.aspx`);
    const h0 = await r0.text();
    const d0 = parseHTML(h0);
    const hf0 = getHidden(d0);

    // Prüfen ob wir schon im richtigen Monat sind
    const headerEl = d0.querySelector("header h4");
    const headerText = headerEl ? headerEl.textContent : "";
    const correctMonth = headerText.includes(MONATE[S.month]) && headerText.includes(String(S.year));

    if (!correctMonth) {
      // Zum richtigen Monat navigieren via CalRoster PostBack
      const navPayload = buildForm({
        ...hf0,
        "__EVENTTARGET": "ctl00$ctl00$cntMainBody$calRoster",
        "__EVENTARGUMENT": dateStr,
      });
      const r1 = await pfetch(`${BASE}/roster.aspx`, { method:"POST", body:navPayload });
      rosterHtml = await r1.text();
    } else {
      rosterHtml = h0;
    }

    S.services = parseRoster(rosterHtml, S.month+1, S.year);
    renderCalendar();
    renderStats();

  } catch(e) {
    document.getElementById("calBox").innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-title">Fehler beim Laden</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ─── ROSTER PARSEN ────────────────────────────────────────────────────────────
function parseRoster(html, month, year) {
  const doc = parseHTML(html);
  const services = [];

  // Alle calDay TDs durchsuchen
  doc.querySelectorAll("td.calDay").forEach(td => {
    const title = td.getAttribute("title")||"";
    const href  = td.getAttribute("href")||"";

    // Tagnummer aus dem strong-Element oder href
    let day = "";
    const strong = td.querySelector("strong");
    if (strong) day = strong.textContent.trim().replace(/\D.*/,"").padStart(2,"0");

    // Nur aktiver Monat (nicht calOther)
    if (td.classList.contains("calOther")) return;

    // Abwesend markieren
    const isAbsent = title.includes("abwesend") || td.querySelector("span")?.textContent.trim() === "ERSA";

    // Dienst?
    if (title.includes("Dienst:") && !title.includes("abwesend")) {
      const m = title.match(/Dienst:\s*(\S+)/);
      const id = m ? m[1] : "";
      const tz = title.match(/Zeit:\s*([\d:]+\s*-\s*[\d:]+)/);
      const time = tz ? tz[1].replace(/\s/g,"") : "";

      if (id && day) {
        services.push({ day, id, time, month:pad2(month), year:String(year), absent:false });
      }
    } else if (isAbsent && day) {
      // Abwesenheit anzeigen
      services.push({ day, id:"ERSA", time:"", month:pad2(month), year:String(year), absent:true });
    }
  });

  return services;
}

// ─── KALENDER RENDERN ─────────────────────────────────────────────────────────
function renderCalendar() {
  const y=S.year, m=S.month;
  const first = new Date(y,m,1).getDay(); // 0=So
  const off   = first===0 ? 6 : first-1;  // Mo=0
  const days  = new Date(y,m+1,0).getDate();
  const today = new Date();
  const isCurr = today.getFullYear()===y && today.getMonth()===m;

  // Dienst-Map
  const smap = {};
  for (const s of S.services) {
    const d = parseInt(s.day);
    if (!smap[d]) smap[d] = [];
    smap[d].push(s);
  }

  let html = `<div class="cal-head">`;
  ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach((d,i) =>
    html += `<div class="cal-wd${i>=5?" we":""}">${d}</div>`);
  html += `</div><div class="cal-grid">`;

  for (let i=0;i<off;i++) html += `<div class="cal-day empty"></div>`;

  for (let d=1;d<=days;d++) {
    const dow = (off+d-1)%7; // 0=Mo … 6=So
    const we  = dow>=5;
    const tod = isCurr && today.getDate()===d;
    const svcs = smap[d]||[];
    const hasDienst = svcs.some(s=>!s.absent);
    let cls = "cal-day";
    if (we) cls+=" we";
    if (tod) cls+=" today";
    if (hasDienst) cls+=" clickable";

    const dnHtml = tod
      ? `<div class="dnum"><span style="background:var(--blue);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;">${d}</span></div>`
      : `<div class="dnum">${d}</div>`;

    let chips = "";
    for (const s of svcs) {
      if (s.absent) {
        chips += `<span class="chip-abs">frei</span>`;
      } else {
        chips += `<span class="chip">${s.id}</span>`;
        if (s.time) chips += `<div class="chip-time">${s.time}</div>`;
      }
    }

    const dienste = svcs.filter(s=>!s.absent);
    const onclick = hasDienst
      ? `onclick="showDetail('${pad2(d)}','${dienste[0].id}',${dow})"` : "";

    html += `<div class="${cls}" ${onclick}>${dnHtml}${chips}</div>`;
  }
  html += `</div>`;
  document.getElementById("calBox").innerHTML = html;
}

function renderStats() {
  const dienste = S.services.filter(s=>!s.absent);
  if (!dienste.length) { document.getElementById("statsRow").style.display="none"; return; }
  document.getElementById("statsRow").style.display="flex";
  document.getElementById("stCount").textContent = dienste.length;

  let tot=0;
  for (const s of dienste) {
    if (s.time&&s.time.includes("-")) {
      const [a,b]=s.time.split("-");
      let d=zeit2min(b.trim())-zeit2min(a.trim());
      if (d<0) d+=1440; tot+=d;
    }
  }
  document.getElementById("stH").textContent = tot>0 ? `${Math.round(tot/60)}h` : "—";

  const td = new Date();
  const nxt = dienste.find(s=>{ const dt=new Date(parseInt(s.year),parseInt(s.month)-1,parseInt(s.day)); return dt>=td; });
  if (nxt) {
    const dt=new Date(parseInt(nxt.year),parseInt(nxt.month)-1,parseInt(nxt.day));
    const wi=dt.getDay()===0?6:dt.getDay()-1;
    document.getElementById("stNext").textContent = WKTAG[wi]+" "+parseInt(nxt.day)+".";
  } else { document.getElementById("stNext").textContent="—"; }
}

function updateMonthTitle() {
  document.getElementById("monthTitle").textContent = `${MONATE[S.month]} ${S.year}`;
}

// ─── DETAIL ───────────────────────────────────────────────────────────────────
async function showDetail(day, dienstId, dow) {
  const dateStr = `${S.year}-${pad2(S.month+1)}-${day}`;
  const wi = dow; // 0=Mo…6=So
  const wt = WKLONG[wi];
  const datum = `${day}.${pad2(S.month+1)}.${S.year}`;

  document.getElementById("dTitle").textContent = `Dienst ${dienstId}`;
  document.getElementById("dSub").textContent   = `${wt}, ${datum}`;
  document.getElementById("dBody").innerHTML    = `<div class="spin-wrap"><div class="spin"></div><div class="spin-txt">Lade Umlauf-Details…</div></div>`;
  document.getElementById("detailBox").classList.add("on");
  document.getElementById("detailBox").scrollIntoView({behavior:"smooth",block:"start"});

  try {
    const r0 = await pfetch(`${BASE}/roster.aspx`);
    const h0 = await r0.text();
    const d0 = parseHTML(h0);
    const hf0 = getHidden(d0);

    const navPayload = buildForm({
      ...hf0,
      "__EVENTTARGET": "ctl00$ctl00$cntMainBody$calRoster",
      "__EVENTARGUMENT": dateStr,
    });
    await pfetch(`${BASE}/roster.aspx`, { method:"POST", body:navPayload });

    const rShift = await pfetch(`${BASE}/shift.aspx?${dateStr}`);
    const hShift = await rShift.text();

    const umlaeufe = parseShift(hShift, dienstId, wi);

    if (!umlaeufe.length) {
      document.getElementById("dBody").innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-title">Keine Umlauf-Daten</div><div class="empty-sub">Dienst ${dienstId} für ${datum} nicht gefunden.</div></div>`;
      return;
    }

    renderDetail(dienstId, datum, wi, umlaeufe);

  } catch(e) {
    document.getElementById("dBody").innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-title">Ladefehler</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ─── SHIFT PARSEN ─────────────────────────────────────────────────────────────
function parseShift(html, dienstId, dow) {
  const doc = parseHTML(html);
  const tbl = doc.getElementById("ctl00_cntMainBody_lstDienstinfo");
  if (!tbl) return [];

  const rows = [];
  tbl.querySelectorAll("tbody tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    if (tds.length < 10) return;
    const c = Array.from(tds).map(td => td.textContent.trim().replace(/\u00a0/g,""));
    if (c[0] !== dienstId) return;
    rows.push({ vonZeit:c[1], vonOrt:c[2], bisZeit:c[3], bisOrt:c[4], linie:c[6], umlauf:c[8], art:c[9] });
  });

  const result = [];
  let curUml=null, ersteF=null, letzteF=null;

  function abschluss(pauseDanach) {
    if (curUml&&ersteF&&letzteF) {
      result.push({
        nr: curUml,
        linie: ersteF.linie,
        start: { zeit:ersteF.vonZeit, von:ort2kuerzel(ersteF.vonOrt), nach:ort2kuerzel(ersteF.bisOrt), vonOrt:ersteF.vonOrt },
        ende:  { zeit:letzteF.bisZeit, bisOrt:letzteF.bisOrt, vonOrt:letzteF.vonOrt, bis:ort2kuerzel(letzteF.bisOrt), vonCode:ort2kuerzel(letzteF.vonOrt), linie:letzteF.linie },
        pauseDanach
      });
    }
    curUml=null; ersteF=null; letzteF=null;
  }

  for (const row of rows) {
    const art = row.art.toLowerCase();
    if (art.includes("wendezeit")) continue;
    if (art.includes("pause")) { abschluss(true); continue; }
    if (!art.includes("lenkzeit")) continue;

    if (curUml&&row.umlauf!==curUml) abschluss(false);
    if (!curUml) { curUml=row.umlauf; ersteF=row; }
    letzteF=row;
  }
  abschluss(false);
  return result;
}

// ─── DETAIL RENDERN ───────────────────────────────────────────────────────────
function renderDetail(dienstId, datum, dow, umlaeufe) {
  let html = `<div class="ulist">`;
  let startZ="", endeZ="";

  for (let i=0;i<umlaeufe.length;i++) {
    const u=umlaeufe[i];
    const nach = u.start.nach;
    const gegenCode = gegenEnd(u.ende.linie, u.ende.vonCode, dow) || u.ende.bis;

    if (i===0) startZ=u.start.zeit;
    endeZ=u.ende.zeit;

    html += `<div class="ucard">
      <div class="ucard-head">
        <span class="unr">Umlauf ${u.nr}</span>
        <span class="ulinie">L ${u.linie}</span>
      </div>
      <div class="ubody">
        <div class="srow s">
          <span class="stime">${u.start.zeit}</span>
          <span class="sarr">→</span>
          <span class="scode">${u.start.von}</span>
          <span class="sname">${u.start.vonOrt}</span>
        </div>
        <div class="srow" style="padding:2px 0 2px 48px;">
          <span style="font-size:10px;color:var(--muted);">→ ${nach} · Linie ${u.linie}</span>
        </div>
        <div class="srow e">
          <span class="stime">${u.ende.zeit}</span>
          <span class="sarr">→</span>
          <span class="scode">${u.ende.bis}</span>
          <span class="sname">${u.ende.bisOrt}</span>
        </div>
      </div>
      ${u.pauseDanach?'<div class="pause-badge">☕ Pause</div>':""}
    </div>`;
  }
  html += `</div>`;

  if (startZ&&endeZ) {
    const diff=zeit2min(endeZ)-zeit2min(startZ);
    html += `<div class="total">
      <div><div class="total-lbl">Gesamtdienst</div><div class="total-range">${startZ} – ${endeZ}</div></div>
      <div class="total-val">${min2str(diff)}</div>
    </div>`;
  }

  const rawText = buildRaw(dienstId, datum, dow, umlaeufe, startZ, endeZ);
  S.rawText  = rawText;
  S.rawTitle = `Dienst ${dienstId} - ${datum}`;

  html += `<div class="acts">
    <button class="abtn note" onclick="openNotizen()">📋 In Notizen</button>
    <button class="abtn copy" onclick="copyText()">📋 Kopieren</button>
    <button class="abtn ios"  onclick="openShortcut()">⚡ Shortcut</button>
  </div>
  <div class="raw">${rawText.replace(/</g,"&lt;")}</div>`;

  document.getElementById("dBody").innerHTML = html;
}

// ─── RAW TEXT ─────────────────────────────────────────────────────────────────
function buildRaw(dienstId, datum, dow, umlaeufe, startZ, endeZ) {
  const dp = datum.split(".");
  const kurz = `${dp[0]}.${dp[1]}.${dp[2].slice(-2)}`;
  const wk = WKTAG[dow];
  const lines = [`${wk}, ${kurz}   ${dienstId}`, "─".repeat(24)];

  for (let i=0;i<umlaeufe.length;i++) {
    const u=umlaeufe[i];
    const nach = u.start.nach;
    const gegenCode = gegenEnd(u.ende.linie, u.ende.vonCode, dow) || u.ende.bis;
    if (i>0) lines.push("");
    lines.push(`${u.start.von.padEnd(6)}${u.start.zeit}  ${u.linie.padStart(2)}  ${nach}`);
    lines.push(`      => ${u.nr}`);
    lines.push(`${u.ende.bis.padEnd(6)}${u.ende.zeit}  ${u.ende.linie.padStart(2)}  ${gegenCode}`);
    if (u.pauseDanach) lines.push("\n      ☕ Pause");
  }

  lines.push("─".repeat(24));
  if (startZ&&endeZ) {
    const diff=zeit2min(endeZ)-zeit2min(startZ);
    lines.push(`${startZ} – ${endeZ}  (${min2str(diff)})`);
  }
  return lines.join("\n");
}

// ─── AKTIONEN ────────────────────────────────────────────────────────────────
function copyText() {
  if (!S.rawText) return;
  navigator.clipboard.writeText(S.rawText).then(()=>toast("✓ Text kopiert")).catch(()=>{
    const ta=document.createElement("textarea"); ta.value=S.rawText;
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); toast("✓ Text kopiert");
  });
}

function openNotizen() {
  if (!S.rawText) return;
  const url=`shortcuts://run-shortcut?name=DienstplanSpeichern&input=text&text=${encodeURIComponent(S.rawText)}`;
  window.location.href=url; toast("Öffne Shortcut…");
}

function openShortcut() { openNotizen(); }

function closeDetail() {
  document.getElementById("detailBox").classList.remove("on");
}

async function changeMonth(dir) {
  S.month+=dir;
  if (S.month>11){S.month=0;S.year++;}
  if (S.month<0){S.month=11;S.year--;}
  await loadDienstplan();
}
